services:
  nav_autonomy:
    image: iserverobotics/nav_autonomy:${IMAGE_TAG:-jazzy}
    container_name: nav_autonomy

    # Shared memory for ROS 2 FastDDS
    shm_size: '8gb'

    stdin_open: true
    tty: true

    # Host network required for ROS 2 DDS discovery and hardware access
    network_mode: host

    # Privileged for hardware device access
    privileged: true

    # GPU runtime (set DOCKER_RUNTIME=nvidia in .env if needed)
    runtime: ${DOCKER_RUNTIME:-runc}

    restart: unless-stopped

    # Load hardware configuration from .env
    env_file:
      - .env

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - LIDAR_INTERFACE=${LIDAR_INTERFACE:-}
      - LIDAR_COMPUTER_IP=${LIDAR_COMPUTER_IP:-192.168.1.5}
      - LIDAR_GATEWAY=${LIDAR_GATEWAY:-192.168.1.1}
      - LIDAR_IP=${LIDAR_IP:-192.168.1.116}
      - MOTOR_SERIAL_DEVICE=${MOTOR_SERIAL_DEVICE:-/dev/ttyACM0}
      - ENABLE_WIFI_BUFFER=${ENABLE_WIFI_BUFFER:-false}
      - USE_RVIZ=${USE_RVIZ:-false}
      - MAP_PATH=${MAP_PATH:-}
      - USE_UNITREE=${USE_UNITREE:-false}
      - UNITREE_IP=${UNITREE_IP:-192.168.12.1}
      - UNITREE_CONN=${UNITREE_CONN:-LocalAP}
      - AUTONOMY_SPEED=${AUTONOMY_SPEED:-1.0}
      - ROBOT_CONFIG_PATH=${ROBOT_CONFIG_PATH:-}
      - DISABLE_OBSTACLE_AVOIDANCE=${DISABLE_OBSTACLE_AVOIDANCE:-true}
      - PUBLISH_CAMERA=${PUBLISH_CAMERA:-}
      # SLAM configuration
      - LOCALIZATION_METHOD=${LOCALIZATION_METHOD:-}
      # Vision semantic API
      - ROBOT_HOST=${ROBOT_HOST:-}
      - ROBOT_STATUS_PORT=${ROBOT_STATUS_PORT:-8080}
      - SEMANTIC_TAG_WRITEBACK=${SEMANTIC_TAG_WRITEBACK:-false}

    volumes:
      # X11 for GUI (RViz)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      # Time zone
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # Persistent maps and logs
      - ./maps:/ros2_ws/maps:rw
      - ./logs:/ros2_ws/logs:rw

    devices:
      - /dev/input:/dev/input
      - /dev/dri:/dev/dri
      - ${MOTOR_SERIAL_DEVICE:-/dev/ttyACM0}:${MOTOR_SERIAL_DEVICE:-/dev/ttyACM0}

    group_add:
      - ${INPUT_GID:-995}
      - ${DIALOUT_GID:-20}

    # Real-time scheduling and memory locking for FastLIO / lidar driver
    ulimits:
      rtprio: 99
      memlock:
        soft: -1
        hard: -1
      nice: -20

    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_TIME
      - SYS_NICE

    command:
      - bash
      - -c
      - |
        echo "Starting real robot system with route planner..."
        if [ "$$LOCALIZATION_METHOD" = "arise_slam" ]; then
          LAUNCH_ARGS="use_fastlio2:=false"
          echo "  SLAM Method:       ARISE SLAM"
        else
          LAUNCH_ARGS="use_fastlio2:=true"
          echo "  SLAM Method:       FASTLIO2"
        fi
        [ -n "$$MAP_PATH" ] && LAUNCH_ARGS="$$LAUNCH_ARGS traverse_poses_file:=$$MAP_PATH/traverse_poses.txt"
        [ -n "$$ROBOT_HOST" ] && LAUNCH_ARGS="$$LAUNCH_ARGS traverse_semantic_api_url:=http://$$ROBOT_HOST:$${ROBOT_STATUS_PORT:-8080}/api/vision/semantic"
        LAUNCH_ARGS="$$LAUNCH_ARGS traverse_semantic_tag_writeback:=$${SEMANTIC_TAG_WRITEBACK:-false}"
        ros2 launch vehicle_simulator system_real_robot_with_route_planner.launch.py $$LAUNCH_ARGS bridge_autonomy_speed:=$${AUTONOMY_SPEED:-1.0} &
        NAV_PID=$$!
        sleep 2
        # Launch Unitree WebRTC control if enabled
        if [ "$USE_UNITREE" = "true" ]; then
          PUBLISH_CAM=$${PUBLISH_CAMERA:-false}
          echo "Starting Unitree WebRTC control (IP: $$UNITREE_IP, Method: $$UNITREE_CONN, camera: $$PUBLISH_CAM)..."
          ros2 launch unitree_webrtc_ros unitree_control.launch.py robot_ip:=$$UNITREE_IP connection_method:=$$UNITREE_CONN disable_obstacle_avoidance:=$$DISABLE_OBSTACLE_AVOIDANCE publish_camera:=$$PUBLISH_CAM &
        fi
        echo "Starting Foxglove Bridge on port 8765..."
        ros2 run foxglove_bridge foxglove_bridge --ros-args -p port:=8765 -p send_buffer_limit:=100000000 -p max_qos_depth:=1 &
        if [ "$$USE_RVIZ" = "true" ]; then
          echo "Starting RViz2..."
          ros2 run rviz2 rviz2 -d /ros2_ws/src/route_planner/far_planner/rviz/default.rviz &
        fi
        wait $$NAV_PID

  iserve_map:
    image: iserverobotics/iserve_map:jazzy
    container_name: iserve_map_jazzy
    restart: unless-stopped

    shm_size: '2gb'
    network_mode: host
    privileged: true

    tmpfs:
      - /iserve_ws/logs:size=256m
      - /iserve_ws/maps:size=768m

    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - TARGET_CONTAINER=${TARGET_CONTAINER:-nav_autonomy}
      - OUTPUT_DIR=/iserve_ws/logs/monitor
      - INTERVAL=${MONITOR_INTERVAL:-1.0}
      - LOG_OUTPUT_DIR=/iserve_ws/logs/analyzer
      - SUMMARY_INTERVAL=${SUMMARY_INTERVAL:-60}
      - ENABLE_CAMERA=${ENABLE_CAMERA:-true}
      - CAMERA_FPS=${CAMERA_FPS:-6}
      - CAMERA_WIDTH=${CAMERA_WIDTH:-640}
      - CAMERA_HEIGHT=${CAMERA_HEIGHT:-480}
      - CLOUD_API_URL=${CLOUD_API_URL:-https://omakase-robotics.com}
      - CLOUD_ROBOT_NAME=${CLOUD_ROBOT_NAME:-iserve-robot}
      - CLOUD_VENDOR=${CLOUD_VENDOR:-iserve}
      - CLOUD_ZONE=${CLOUD_ZONE:-default}
      - CLOUD_TASK_ID=${CLOUD_TASK_ID:-}
      - TELEMETRY_SEND_INTERVAL=${TELEMETRY_SEND_INTERVAL:-1.0}
      - EVENT_SEND_INTERVAL=${EVENT_SEND_INTERVAL:-5.0}
      - SYSTEM_STATS_INTERVAL=${SYSTEM_STATS_INTERVAL:-1.0}
      - PCD_UPLOAD_DIR=${PCD_UPLOAD_DIR:-/iserve_ws/maps/current_best_map}
      - SESSION_UPLOAD_INTERVAL=${SESSION_UPLOAD_INTERVAL:-30.0}
      - LOCALIZATION_METHOD=${LOCALIZATION_METHOD:-}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/json}
      - OTEL_REMOTE_ENDPOINT=${OTEL_REMOTE_ENDPOINT:-https://omakase-robotics.com}
      - TUS_ENABLED=${TUS_ENABLED:-false}
      - TUS_ENDPOINT=${TUS_ENDPOINT:-}
      - DATA_RECORDER_IMAGE_TOPIC=${DATA_RECORDER_IMAGE_TOPIC:-/camera/color/image_raw}
      - DATA_RECORDER_ODOM_TOPIC=${DATA_RECORDER_ODOM_TOPIC:-/state_estimation}
      - DATA_RECORDER_SAVE_RATE=${DATA_RECORDER_SAVE_RATE:-1.0}
      - DATA_RECORDER_ENABLED=${DATA_RECORDER_ENABLED:-false}

    volumes:
      - ./maps:/iserve_ws/maps_persist:rw
      - ./key.txt:/iserve_ws/config/key.txt:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/monitor:/iserve_ws/logs/monitor:rw
      - ./logs/analyzer:/iserve_ws/logs/analyzer:rw
      - ./logs/otel_storage:/iserve_ws/otel_storage:rw
      - ./config/iserve_map.yaml:/iserve_ws/config/iserve_map.yaml:ro

    devices:
      - /dev/bus/usb:/dev/bus/usb

    entrypoint: ["/ros_entrypoint.sh"]
    command:
      - bash
      - -c
      - |
        echo "=== iServe Map (Jazzy) ==="
        echo "ROS_DOMAIN_ID: $$ROS_DOMAIN_ID"
        echo "Auto-save: ON | Publish: OFF"
        echo "Camera: $${ENABLE_CAMERA:-true} ($${CAMERA_WIDTH:-640}x$${CAMERA_HEIGHT:-480}@$${CAMERA_FPS:-6}fps)"
        echo "OTel: $${OTEL_ENABLED:-true} | Remote: $${OTEL_REMOTE_ENDPOINT:-https://omakase-robotics.com}"

        # Copy persistent maps from disk into RAM-backed tmpfs
        if [ -d /iserve_ws/maps_persist/current_best_map ]; then
          echo "Loading persistent maps into RAM..."
          cp -a /iserve_ws/maps_persist/current_best_map /iserve_ws/maps/
          echo "Loaded current_best_map ($$(du -sh /iserve_ws/maps/current_best_map | cut -f1))"
        fi

        # Background sync: RAM → disk every 60s (best-effort, OK if disk full)
        (
          while true; do
            sleep 60
            if ! cp -a /iserve_ws/maps/* /iserve_ws/maps_persist/ 2>&1; then
              echo "[sync] WARNING: failed to sync maps to disk (disk full?)" >&2
            fi
          done
        ) &

        bash /iserve_ws/config/monitor.sh $${MONITOR_INTERVAL:-1} &
        # Start local OTel Collector if enabled
        if [ "$$OTEL_ENABLED" = "true" ]; then
          echo "Starting local OTel Collector..."
          # Export CLOUD_API_KEY from key.txt so the collector can use it for auth
          if [ -f /iserve_ws/config/key.txt ]; then
            export $$(grep -v '^#' /iserve_ws/config/key.txt | grep '=' | xargs)
          fi
          # Clear corrupted bbolt storage to prevent collector crash on restart
          rm -rf /iserve_ws/otel_storage/* 2>/dev/null || true
          otelcol-contrib --config /iserve_ws/config/otel-collector.yaml &
        fi
        ros2 launch iserve_map iserve_map.launch.py \
          params_file:=/iserve_ws/config/iserve_map.yaml &
        MAP_PID=$$!
        sleep 2
        if [ "$${ENABLE_CAMERA:-true}" = "true" ]; then
          echo "Starting RealSense camera..."
          ros2 launch realsense2_camera rs_launch.py \
            enable_color:=true \
            enable_depth:=false \
            enable_infra1:=false \
            enable_infra2:=false \
            pointcloud.enable:=false \
            align_depth.enable:=false \
            rgb_camera.color_profile:=$${CAMERA_WIDTH:-640},$${CAMERA_HEIGHT:-480},$${CAMERA_FPS:-6} &
        fi
        echo "Starting Foxglove Bridge on port 8766..."
        ros2 run foxglove_bridge foxglove_bridge --ros-args \
          -p port:=8766 \
          -p send_buffer_limit:=100000000 \
          -p max_qos_depth:=1 \
          -p topic_whitelist:="['/traverse/waypoint_status', '/state_estimation', '/battery_state', '/lidar_health/status', '/icp_session/icp_result', '/iserve_map/recommended_map', '/goal_pose', '/room_segmentation/room_map', '/room_segmentation/room_markers', '/room_segmentation/room_boundaries', '/room_segmentation/status']" \
          -p service_whitelist:="['/map_switcher/switch_map', '/traverse/start', '/traverse/stop', '/traverse/pause']" \
          -p capabilities:="['services', 'clientPublish']" &
        FG_PID=$$!
        echo "Starting on-robot-gui on port 8080..."
        cd /app/gui/backend && NAV_DEPLOY_DIR=/iserve_ws MAPS_DIR=/iserve_ws/maps_persist FOXGLOVE_URL=ws://localhost:8766 uvicorn main:app --host 0.0.0.0 --port 8080 &
        cd /iserve_ws
        echo "Starting nav_autonomy monitor (target: $$TARGET_CONTAINER)..."
        python3 /iserve_ws/scripts/nav_monitor.pyc &
        echo "Starting nav_autonomy log analyzer (target: $$TARGET_CONTAINER)..."
        python3 /iserve_ws/scripts/log_analyzer.pyc &
        echo "Starting iserve_map log analyzer (self)..."
        TARGET_CONTAINER=iserve_map_jazzy LOG_FILE_PREFIX=iserve_map_ python3 /iserve_ws/scripts/log_analyzer.pyc &
        echo "Starting cloud sender..."
        python3 /iserve_ws/scripts/cloud_sender.pyc &
        if [ "$$DATA_RECORDER_ENABLED" = "true" ]; then
          echo "Starting data recorder (image: $$DATA_RECORDER_IMAGE_TOPIC, rate: $${DATA_RECORDER_SAVE_RATE}Hz)..."
          python3 /iserve_ws/scripts/perception_recorder.pyc &
        fi
        wait $$MAP_PID $$FG_PID
