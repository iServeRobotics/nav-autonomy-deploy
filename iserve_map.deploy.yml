services:
  iserve_map:
    image: iserverobotics/iserve_map:jazzy
    container_name: iserve_map_jazzy
    restart: unless-stopped

    shm_size: '2gb'
    network_mode: host
    privileged: true

    # RAM-backed working directory for logs and session data (1 GB)
    tmpfs:
      - /iserve_ws/logs:size=256m
      - /iserve_ws/maps:size=768m

    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - TARGET_CONTAINER=${TARGET_CONTAINER:-nav_autonomy}
      - OUTPUT_DIR=/iserve_ws/logs/monitor
      - INTERVAL=${MONITOR_INTERVAL:-1.0}
      - LOG_OUTPUT_DIR=/iserve_ws/logs/analyzer
      - SUMMARY_INTERVAL=${SUMMARY_INTERVAL:-60}
      - ENABLE_CAMERA=${ENABLE_CAMERA:-true}
      - CAMERA_FPS=${CAMERA_FPS:-6}
      - CAMERA_WIDTH=${CAMERA_WIDTH:-640}
      - CAMERA_HEIGHT=${CAMERA_HEIGHT:-480}
      # Cloud sender configuration (API key and robot ID loaded from key.txt)
      - CLOUD_API_URL=${CLOUD_API_URL:-https://omakase-robotics.com}
      - CLOUD_ROBOT_NAME=${CLOUD_ROBOT_NAME:-iserve-robot}
      - CLOUD_VENDOR=${CLOUD_VENDOR:-iserve}
      - CLOUD_ZONE=${CLOUD_ZONE:-default}
      - CLOUD_TASK_ID=${CLOUD_TASK_ID:-}
      - TELEMETRY_SEND_INTERVAL=${TELEMETRY_SEND_INTERVAL:-1.0}
      - EVENT_SEND_INTERVAL=${EVENT_SEND_INTERVAL:-5.0}
      - SYSTEM_STATS_INTERVAL=${SYSTEM_STATS_INTERVAL:-1.0}
      - PCD_UPLOAD_DIR=${PCD_UPLOAD_DIR:-/iserve_ws/maps/current_best_map}
      - SESSION_UPLOAD_INTERVAL=${SESSION_UPLOAD_INTERVAL:-30.0}
      - LOCALIZATION_METHOD=${LOCALIZATION_METHOD:-}
      # OpenTelemetry configuration
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/json}
      - OTEL_REMOTE_ENDPOINT=${OTEL_REMOTE_ENDPOINT:-https://omakase-robotics.com}
      # Resumable upload (tus) configuration
      - TUS_ENABLED=${TUS_ENABLED:-false}
      - TUS_ENDPOINT=${TUS_ENDPOINT:-}
      # Data recorder configuration
      - DATA_RECORDER_IMAGE_TOPIC=${DATA_RECORDER_IMAGE_TOPIC:-/camera/color/image_raw}
      - DATA_RECORDER_ODOM_TOPIC=${DATA_RECORDER_ODOM_TOPIC:-/state_estimation}
      - DATA_RECORDER_SAVE_RATE=${DATA_RECORDER_SAVE_RATE:-1.0}
      - DATA_RECORDER_ENABLED=${DATA_RECORDER_ENABLED:-false}

    volumes:
      # Persistent maps on disk (copied to/from tmpfs on start/save)
      - ./maps:/iserve_ws/maps_persist:rw
      - ./key.txt:/iserve_ws/config/key.txt:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/monitor:/iserve_ws/logs/monitor:rw
      - ./logs/analyzer:/iserve_ws/logs/analyzer:rw
      - ./logs/otel_storage:/iserve_ws/otel_storage:rw
      - ./config/iserve_map.yaml:/iserve_ws/config/iserve_map.yaml:ro

    devices:
      - /dev/bus/usb:/dev/bus/usb

    command:
      - bash
      - -c
      - |
        echo "=== iServe Map (Jazzy) ==="
        echo "ROS_DOMAIN_ID: $ROS_DOMAIN_ID"
        echo "Auto-save: ON | Publish: OFF"
        echo "Camera: ${ENABLE_CAMERA:-true} (${CAMERA_WIDTH:-640}x${CAMERA_HEIGHT:-480}@${CAMERA_FPS:-6}fps)"
        echo "OTel: ${OTEL_ENABLED:-true} | Remote: ${OTEL_REMOTE_ENDPOINT:-https://omakase-robotics.com}"

        # Copy persistent maps from disk into RAM-backed tmpfs
        if [ -d /iserve_ws/maps_persist/current_best_map ]; then
          echo "Loading persistent maps into RAM..."
          cp -a /iserve_ws/maps_persist/current_best_map /iserve_ws/maps/
          echo "Loaded current_best_map ($(du -sh /iserve_ws/maps/current_best_map | cut -f1))"
        fi

        # Background sync: RAM → disk every 60s (best-effort, OK if disk full)
        (
          while true; do
            sleep 60
            if ! cp -a /iserve_ws/maps/* /iserve_ws/maps_persist/ 2>&1; then
              echo "[sync] WARNING: failed to sync maps to disk (disk full?)" >&2
            fi
          done
        ) &

        bash /iserve_ws/config/monitor.sh ${MONITOR_INTERVAL:-1} &
        # Start local OTel Collector if enabled
        if [ "$OTEL_ENABLED" = "true" ]; then
          echo "Starting local OTel Collector..."
          # Export CLOUD_API_KEY from key.txt so the collector can use it for auth
          if [ -f /iserve_ws/config/key.txt ]; then
            export $(grep -v '^#' /iserve_ws/config/key.txt | grep '=' | xargs)
          fi
          otelcol-contrib --config /iserve_ws/config/otel-collector.yaml &
        fi
        ros2 launch iserve_map iserve_map.launch.py \
          params_file:=/iserve_ws/config/iserve_map.yaml &
        MAP_PID=$!
        sleep 2
        if [ "${ENABLE_CAMERA:-true}" = "true" ]; then
          echo "Starting RealSense camera..."
          ros2 launch realsense2_camera rs_launch.py \
            enable_color:=true \
            enable_depth:=false \
            enable_infra1:=false \
            enable_infra2:=false \
            pointcloud.enable:=false \
            align_depth.enable:=false \
            rgb_camera.color_profile:=${CAMERA_WIDTH:-640},${CAMERA_HEIGHT:-480},${CAMERA_FPS:-6} &
        fi
        echo "Starting Foxglove Bridge on port 8766..."
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8766 &
        FG_PID=$!
        echo "Starting nav_autonomy monitor (target: $TARGET_CONTAINER)..."
        python3 /iserve_ws/scripts/nav_monitor.py &
        echo "Starting nav_autonomy log analyzer (target: $TARGET_CONTAINER)..."
        python3 /iserve_ws/scripts/log_analyzer.py &
        echo "Starting iserve_map log analyzer (self)..."
        TARGET_CONTAINER=iserve_map_jazzy LOG_FILE_PREFIX=iserve_map_ python3 /iserve_ws/scripts/log_analyzer.py &
        echo "Starting cloud sender..."
        python3 /iserve_ws/scripts/cloud_sender.py &
        if [ "$DATA_RECORDER_ENABLED" = "true" ]; then
          echo "Starting data recorder (image: $DATA_RECORDER_IMAGE_TOPIC, rate: ${DATA_RECORDER_SAVE_RATE}Hz)..."
          python3 /iserve_ws/scripts/perception_recorder.py &
        fi
        wait $MAP_PID $FG_PID
