      - TELEMETRY_SEND_INTERVAL=${TELEMETRY_SEND_INTERVAL:-1.0}
      - EVENT_SEND_INTERVAL=${EVENT_SEND_INTERVAL:-5.0}
      - SYSTEM_STATS_INTERVAL=${SYSTEM_STATS_INTERVAL:-1.0}
      - PCD_UPLOAD_DIR=${PCD_UPLOAD_DIR:-/iserve_ws/maps/current_best_map}
